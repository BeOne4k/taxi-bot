version: '3.8'

services:
  taxi-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data        # Persists WA session, registry, images
    ports:
      - "8080:8080"             # Webhook API
    shm_size: '256mb'           # Required for Chromium/Puppeteer
